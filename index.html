<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Word Atelier</title>
<style>
:root{
  --bg:#08060a;--panel:rgba(18,13,20,.78);--panel2:rgba(30,20,32,.88);
  --line:rgba(255,217,166,.18);--line2:rgba(255,137,184,.18);
  --text:#fff4ee;--muted:#c9b3aa;--soft:#967e79;
  --pink:#ff78ad;--pink2:#ffc1d6;--gold:#d6aa5f;--gold2:#ffe7b8;
  --red:#ff6e8c;--green:#60d394;--peach:#ffd0bd;--cream:#fff0d3;--shadow:0 28px 90px rgba(0,0,0,.52);
  --radius:26px;
}
*{box-sizing:border-box}
html,body{min-height:100%}
body{
  margin:0;color:var(--text);
  font:14px/1.55 Inter,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:
    linear-gradient(90deg,rgba(5,4,7,.92),rgba(8,6,10,.74),rgba(5,4,7,.92)),
    radial-gradient(circle at 15% 10%,rgba(255,120,173,.20),transparent 24%),
    radial-gradient(circle at 82% 14%,rgba(214,170,95,.16),transparent 24%),
    #08060a;
  overflow-x:hidden;
}
body::before,body::after{content:"";position:fixed;inset:0;pointer-events:none}
body::before{
  background:
    url("word-atelier-assets/texture-black-pink.jpg") center/cover no-repeat,
    radial-gradient(circle at 80% 80%,rgba(255,120,173,.12),transparent 30%);
  opacity:.16;filter:saturate(1.12) contrast(1.08);
}
body::after{
  background-image:radial-gradient(rgba(255,231,184,.18) 1px,transparent 1px);
  background-size:28px 28px;opacity:.08;mix-blend-mode:screen;
}
button,input,textarea{font:inherit;color:inherit}
button{cursor:pointer}
h1,h2,h3,h4,p{margin:0}
.app{max-width:1540px;margin:0 auto;padding:18px;position:relative;z-index:1}
.layout{display:grid;grid-template-columns:280px minmax(0,1fr);gap:18px;align-items:start}
.side{display:grid;gap:14px;position:sticky;top:16px}
.panel,.page,.card,.btn,.chip,.nav button,.seg button,.field input,.field textarea,#historySearch,.calendar-day,.image-tile{
  border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),rgba(15,10,17,.70));
  backdrop-filter:blur(18px) saturate(1.18);box-shadow:var(--shadow);
}
.panel,.page,.card,.image-tile{border-radius:var(--radius)}
.panel,.page{padding:16px}
.brand{display:flex;gap:13px;align-items:center}
.mark{width:50px;height:50px;border-radius:18px;background:linear-gradient(135deg,var(--pink),var(--gold2));box-shadow:0 18px 42px rgba(255,120,173,.28)}
.eyebrow{display:inline-flex;gap:8px;align-items:center;font-size:12px;letter-spacing:.17em;text-transform:uppercase;color:var(--pink2)}
.eyebrow::before{content:"";width:25px;height:1px;background:linear-gradient(90deg,transparent,var(--pink),var(--gold))}
.title{font-size:34px;line-height:1.04;letter-spacing:.02em;margin:10px 0}
.muted,.tiny,.empty,.note{color:var(--muted)}
.tiny{font-size:12px}
.stack{display:grid;gap:10px}
.row,.toolbar,.nav,.seg,.chips,.meta,.head{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.head{justify-content:space-between}
.nav,.seg{padding:4px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);border-radius:999px}
.nav button,.seg button,.btn,.chip{
  border-radius:999px;padding:9px 13px;border-color:rgba(255,255,255,.08);background:rgba(255,255,255,.04);
}
.nav button.active,.seg button.active,.btn.primary{
  color:#180e12;border-color:transparent;background:linear-gradient(135deg,var(--pink),var(--pink2) 42%,var(--gold2));
  box-shadow:0 16px 34px rgba(255,120,173,.18);
}
.btn.danger{border-color:rgba(255,110,140,.28);background:rgba(255,110,140,.13)}
.btn.good{border-color:rgba(96,211,148,.22);background:rgba(96,211,148,.12)}
.btn,.chip,.nav button,.seg button,.card,.calendar-day{transition:transform .16s ease,border-color .16s ease,background .16s ease}
.btn:hover,.chip:hover,.nav button:hover,.seg button:hover,.card:hover,.calendar-day:hover{transform:translateY(-1px)}
.stat{display:flex;justify-content:space-between;align-items:baseline;padding:10px 12px;border-radius:18px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07)}
.stat strong{font-size:20px;color:var(--gold2)}
.pages{display:grid;gap:16px}
.page{display:none;overflow:hidden;position:relative}
.page.active{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:.7;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.hero{display:grid;grid-template-columns:minmax(0,1.1fr) 360px;gap:16px}
.hero-visual{min-height:430px;border-radius:32px;padding:30px;display:flex;align-items:flex-end;position:relative;overflow:hidden;background:linear-gradient(90deg,rgba(5,4,7,.82),rgba(5,4,7,.24),rgba(5,4,7,.76)),url("word-atelier-assets/final-home-hero.jpg") center 38%/cover}
.hero-visual::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,4,7,.05) 0%,rgba(5,4,7,.70) 88%),radial-gradient(circle at 70% 22%,rgba(255,231,184,.15),transparent 22%);backdrop-filter:none}
.hero-visual::after{content:"";position:absolute;right:18px;top:18px;width:240px;height:320px;border-radius:120px;background:url("word-atelier-assets/final-butterfly-overlay.jpg") center/cover no-repeat;opacity:.16;filter:saturate(1.08);mix-blend-mode:screen}
.hero-content{position:relative;z-index:1;max-width:760px}
.hero-content .title{max-width:700px;font-size:38px;line-height:1.18;text-shadow:0 18px 48px rgba(0,0,0,.45)}
.hero-side{display:grid;grid-template-rows:1fr auto;gap:14px}
.image-tile{min-height:220px;overflow:hidden;background:linear-gradient(180deg,rgba(5,4,7,.08),rgba(5,4,7,.70)),url("word-atelier-assets/texture-pink-gold.jpg") center/cover}
.image-tile.shell{background:linear-gradient(180deg,rgba(5,4,7,.04),rgba(5,4,7,.62)),url("word-atelier-assets/new-pink-marble.jpg") center/cover}
.image-tile.night{background:linear-gradient(180deg,rgba(5,4,7,.02),rgba(5,4,7,.70)),url("word-atelier-assets/new-night-collage.jpg") center/cover}
.image-tile.lux{background:linear-gradient(180deg,rgba(5,4,7,.02),rgba(5,4,7,.72)),url("word-atelier-assets/new-gold-crown-grid.jpg") center/cover}
.image-tile.wave{background:linear-gradient(180deg,rgba(5,4,7,.04),rgba(5,4,7,.76)),url("word-atelier-assets/new-gold-wave.jpg") center/cover}
.image-tile.sea{background:linear-gradient(180deg,rgba(5,4,7,.06),rgba(5,4,7,.62)),url("word-atelier-assets/final-sidebar-fill.jpg") center 42%/cover}
.image-tile.side-art{min-height:230px;background:linear-gradient(180deg,rgba(5,4,7,.08),rgba(5,4,7,.48)),url("word-atelier-assets/sidebar-night-collage.jpg") center 46%/cover}
.main-grid{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:16px;align-items:start}
.decor{min-height:520px;background:linear-gradient(180deg,rgba(5,4,7,.02),rgba(5,4,7,.72)),url("word-atelier-assets/mood-pink-black.jpg") center/cover}
.decor.gold{background:linear-gradient(180deg,rgba(5,4,7,.03),rgba(5,4,7,.74)),url("word-atelier-assets/new-gold-luxe-grid.jpg") center/cover}
.decor.black{background:linear-gradient(180deg,rgba(5,4,7,.08),rgba(5,4,7,.58)),url("word-atelier-assets/final-home-side.jpg") center/cover}
.decor.record{background:linear-gradient(180deg,rgba(5,4,7,.04),rgba(5,4,7,.74)),url("word-atelier-assets/final-record.jpg") center/cover}
.decor.history{background:linear-gradient(180deg,rgba(5,4,7,.06),rgba(5,4,7,.64)),url("word-atelier-assets/final-history.jpg") center/cover}
.decor.study{background:linear-gradient(180deg,rgba(5,4,7,.05),rgba(5,4,7,.60)),url("word-atelier-assets/final-study.jpg") center/cover}
.decor.mistakes{background:linear-gradient(180deg,rgba(5,4,7,.06),rgba(5,4,7,.76)),url("word-atelier-assets/new-gold-wings.jpg") center/cover}
.decor.record,.decor.history,.decor.study,.decor.black,.image-tile.side-art{position:relative}
.decor.record::after,.decor.history::after,.decor.study::after,.decor.black::after,.image-tile.side-art::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;mix-blend-mode:screen;opacity:.12;background:url("word-atelier-assets/final-overlay-pink.jpg") center/cover}
.decor.history::after{opacity:.14;background-image:url("word-atelier-assets/final-overlay-night.jpg")}
.decor.study::after{opacity:.16;background-image:url("word-atelier-assets/final-butterfly-overlay.jpg");background-size:cover}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:grid;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;letter-spacing:.10em;text-transform:uppercase;color:var(--pink2)}
.field input,.field textarea,#historySearch{width:100%;outline:none;border-radius:18px;padding:12px 14px;border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.035);color:var(--text)}
.field input:focus,.field textarea:focus,#historySearch:focus{border-color:rgba(255,193,214,.38);box-shadow:0 0 0 3px rgba(255,120,173,.08)}
.field input::placeholder,.field textarea::placeholder,#historySearch::placeholder{color:rgba(255,244,238,.48)}
.field textarea{min-height:104px;resize:vertical}
.note,.empty{padding:12px 14px;border:1px dashed rgba(255,255,255,.13);background:rgba(255,255,255,.025);border-radius:18px}
.list{display:grid;gap:10px}
.card{padding:14px;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--pink),var(--gold))}
.card h4{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:18px}
.card p{color:var(--muted)}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.chip{display:inline-flex;gap:6px;align-items:center;white-space:nowrap;color:var(--text);box-shadow:none}
.chip.warn{background:rgba(255,120,173,.10);border-color:rgba(255,120,173,.25)}
.chip.gold{background:rgba(214,170,95,.10);border-color:rgba(214,170,95,.25)}
.chip.good{background:rgba(96,211,148,.11);border-color:rgba(96,211,148,.25)}
.lookup-box{display:grid;gap:10px;padding:14px;border-radius:22px;border:1px solid rgba(255,217,166,.16);background:rgba(255,255,255,.03)}
.calendar-nav{display:flex;gap:8px;align-items:center}
.calendar-nav .btn{min-width:36px;padding:7px 10px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.calendar-day{min-height:42px;border-radius:14px;display:grid;place-items:center;position:relative;background:rgba(255,255,255,.035);box-shadow:none;color:var(--muted)}
.calendar-day.head{min-height:auto;border:0;background:transparent;box-shadow:none;color:var(--soft);font-size:12px}
.calendar-day.done{color:#26100f;background:linear-gradient(135deg,var(--peach),var(--pink2) 48%,var(--cream));border-color:transparent;font-weight:800;box-shadow:0 12px 28px rgba(255,193,214,.18)}
.calendar-day.opened::after{content:"";position:absolute;bottom:6px;width:5px;height:5px;border-radius:50%;background:#d5aeb5;box-shadow:0 0 0 3px rgba(213,174,181,.16)}
.calendar-day.today{color:#fff;background:#d5aeb5;border-color:transparent;font-weight:900;box-shadow:0 14px 30px rgba(213,174,181,.28)}
.calendar-day.today::after{background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.20)}
.steps{display:grid;gap:14px}
.step{display:none}
.step.active{display:grid;gap:12px}
.choice-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.choice{min-height:110px;border-radius:22px;padding:16px;text-align:left}
.choice strong{display:block;font-size:20px;margin-bottom:8px}
.date-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.date-choice{min-height:72px;border-radius:20px;padding:14px;text-align:left}
.question-card{display:grid;grid-template-columns:minmax(0,1fr) minmax(260px,.7fr);gap:14px;align-items:start}
.question-card.done{border-color:rgba(96,211,148,.25)}
.question-card.wrong{border-color:rgba(255,110,140,.3)}
.progress{height:9px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08)}
.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--pink),var(--gold))}
@media(max-width:1120px){.layout,.hero,.main-grid,.question-card{grid-template-columns:1fr}.side{position:static}.decor{min-height:220px}.choice-grid{grid-template-columns:1fr}}
@media(max-width:700px){.app{padding:12px}.panel,.page{padding:14px}.title{font-size:29px}.form-grid{grid-template-columns:1fr}.card{grid-template-columns:1fr}.actions{justify-content:flex-start}}
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
(() => {
  const STORAGE = 'word-atelier.clean.v1';
  const CACHE_KEY = 'word-atelier.lookup-cache.v1';
  const LEGACY_KEYS = ['word-atelier.redesign.v1','word-atelier.simple.v1','word-atelier.v4','word-atelier.v3'];
  const $ = (id) => document.getElementById(id);
  const esc = (v) => String(v ?? '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const tidy = (v) => String(v ?? '').trim();
  const localDay = (v = new Date()) => {
    const d = v instanceof Date ? v : new Date(v);
    if (Number.isNaN(d.getTime())) return '';
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };
  const today = () => localDay();
  const day = (v) => localDay(v);
  const wordKey = (v) => tidy(v).toLowerCase().replace(/\s+/g, ' ');
  const isSingleWord = (v) => /^[A-Za-z][A-Za-z'-]*$/.test(tidy(v));
  const cleanAnswer = (v) => tidy(v).toLowerCase().replace(/[\s·,.;，。；、/|()（）【】\[\]{}<>!?！？'"“”‘’:\-]+/g, '');
  const splitText = (v) => [...new Set(tidy(v).split(/[\n,;；、\/|]+/).map(tidy).filter(Boolean))];
  const fmt = (v) => {
    if (!v) return '—';
    const d = new Date(v);
    if (Number.isNaN(d.getTime())) return '—';
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  };
  const firstMeaning = (v) => splitText(v)[0] || tidy(v) || '未填写';

  const fallbackMeanings = {
    like:['喜欢','喜爱','像'],
    agent:['代理人','经纪人','作用者'],
    hi:['你好','嗨'],
    love:['爱','喜欢','热爱'],
    study:['学习','研究'],
    word:['单词','词语'],
    test:['测试','测验'],
    record:['记录','记载'],
    make:['制作','使得'],
    do:['做','完成'],
    go:['去','前往'],
    get:['得到','获得'],
    take:['拿','带走'],
    give:['给','给予'],
    see:['看见','理解'],
    know:['知道','了解'],
    think:['认为','思考'],
    come:['来','到来'],
    want:['想要','需要'],
    use:['使用','用途'],
    find:['找到','发现'],
    tell:['告诉','讲述'],
    ask:['问','请求'],
    work:['工作','作品'],
    seem:['似乎','好像'],
    feel:['感觉','认为'],
    try:['尝试','试图'],
    leave:['离开','留下'],
    call:['打电话','称呼'],
    good:['好的','优秀的'],
    new:['新的','新近的'],
    first:['第一','首先'],
    last:['最后的','上一个'],
    long:['长的','长久地'],
    great:['伟大的','极好的'],
    little:['小的','少量'],
    own:['自己的','拥有'],
    other:['其他的','另外的'],
    old:['旧的','年老的'],
    right:['正确的','右边'],
    big:['大的','重要的'],
    high:['高的','高级的'],
    different:['不同的','各种的'],
    small:['小的','少的'],
    large:['大的','大量的'],
    next:['下一个','接下来'],
    early:['早的','早期的'],
    young:['年轻的','幼小的'],
    important:['重要的'],
    few:['少数的','几个'],
    public:['公共的','公众的'],
    bad:['坏的','糟糕的'],
    able:['能够的','有能力的'],
    beautiful:['美丽的','漂亮的'],
    beauty:['美丽','美人'],
    happy:['快乐的','幸福的'],
    clear:['清楚的','清除'],
    quick:['快速的','迅速的'],
    slow:['慢的','缓慢的'],
    strong:['强壮的','强烈的'],
    weak:['虚弱的','薄弱的'],
    create:['创造','创建'],
    act:['行动','行为'],
    active:['积极的','活跃的'],
    decide:['决定','判定'],
    develop:['发展','开发'],
    move:['移动','搬动'],
    learn:['学习','学会'],
    speak:['说话','发言'],
    write:['写','书写'],
    read:['阅读','读'],
    listen:['听','倾听'],
    remember:['记得','记住'],
    forget:['忘记','遗忘'],
    improve:['改进','提高'],
    change:['改变','变化'],
    search:['搜索','查找']
  };

  const commonFamilies = {
    act:['act v. 行动','action n. 行动','active adj. 积极的','actively adv. 积极地'],
    beauty:['beauty n. 美丽','beautiful adj. 美丽的','beautifully adv. 美丽地','beautify v. 美化'],
    create:['create v. 创造','creation n. 创造','creative adj. 有创造力的','creatively adv. 创造性地'],
    decide:['decide v. 决定','decision n. 决定','decisive adj. 果断的','decisively adv. 果断地'],
    develop:['develop v. 发展','development n. 发展','developing adj. 发展中的'],
    happy:['happy adj. 快乐的','happiness n. 幸福','happily adv. 快乐地'],
    improve:['improve v. 改进','improvement n. 改进','improved adj. 改进的'],
    learn:['learn v. 学习','learner n. 学习者','learning n. 学习'],
    love:['love v./n. 爱','lovely adj. 可爱的','lovingly adv. 亲切地'],
    move:['move v. 移动','movement n. 移动','movable adj. 可移动的'],
    quick:['quick adj. 快的','quickly adv. 快速地','quickness n. 快速'],
    record:['record v./n. 记录','recorder n. 记录者','recorded adj. 已记录的'],
    search:['search v./n. 搜索','searcher n. 搜索者','searching adj. 搜寻的'],
    strong:['strong adj. 强的','strength n. 力量','strongly adv. 强烈地'],
    study:['study v./n. 学习','student n. 学生','studious adj. 好学的'],
    use:['use v./n. 使用','useful adj. 有用的','usefully adv. 有用地','user n. 用户'],
    weak:['weak adj. 弱的','weakness n. 弱点','weakly adv. 虚弱地'],
    write:['write v. 写','writer n. 作者','writing n. 写作','written adj. 写成的']
  };

  let state = loadState();
  let lookupCache = loadLookupCache();
  let lookup = blankLookup();
  let saveTimer = 0;
  let lookupTimer = 0;
  let lookupSeq = 0;
  let controller = null;
  let wired = false;

  function blankLookup(word = '') {
    return {status:'idle',word,meanings:[],pos:'',ipa:'',related:[],usAudio:'',source:'',loading:false,error:''};
  }

  function defaults() {
    return {
      page:'home', selectedId:'', editId:'', sort:'time', mistakeSort:'time', search:'', calendarMonth:today().slice(0, 7),
      records:[], mistakes:[], studyLog:{},
      study:{step:1, source:'all', range:'all', date:'', order:'time', mode:'cn-en', deck:[], answers:{}, graded:false, right:0, wrong:0, summary:'', startedAt:''}
    };
  }

  function normalizeRecord(raw) {
    const now = new Date().toISOString();
    return {
      id: raw.id || crypto.randomUUID(),
      word: tidy(raw.word),
      pos: tidy(raw.pos),
      ipa: tidy(raw.ipa),
      meaning: tidy(raw.meaning),
      related: Array.isArray(raw.related) ? raw.related.map((v) => typeof v === 'string' ? v : v?.word).map(tidy).filter(Boolean) : splitText(raw.related),
      usAudio: tidy(raw.usAudio || raw.audio),
      source: tidy(raw.source),
      createdAt: raw.createdAt || now,
      updatedAt: raw.updatedAt || raw.createdAt || now,
      lastLookupAt: raw.lastLookupAt || ''
    };
  }

  function recordSignature(r) {
    return [wordKey(r.word), tidy(r.meaning), day(r.createdAt), tidy(r.ipa), tidy(r.pos)].join('|');
  }

  function loadState() {
    const base = defaults();
    try {
      const currentRaw = localStorage.getItem(STORAGE);
      const sources = [];
      if (currentRaw) {
        sources.push(JSON.parse(currentRaw));
      } else {
        for (const key of LEGACY_KEYS) {
          const raw = localStorage.getItem(key);
          if (raw) {
            try { sources.push(JSON.parse(raw)); } catch {}
          }
        }
      }

      const records = [];
      const seenIds = new Set();
      const seenExact = new Set();
      const merged = {...base};
      for (const src of sources) {
        if (!src || typeof src !== 'object') continue;
        if (Array.isArray(src.records)) {
          for (const item of src.records) {
            if (!item?.word) continue;
            const record = normalizeRecord(item);
            const exact = recordSignature(record);
            if (seenIds.has(record.id) || seenExact.has(exact)) continue;
            seenIds.add(record.id);
            seenExact.add(exact);
            records.push(record);
          }
        }
        if (Array.isArray(src.mistakes)) merged.mistakes.push(...src.mistakes);
        if (src.studyLog && typeof src.studyLog === 'object') merged.studyLog = {...merged.studyLog, ...src.studyLog};
        if (src.study) merged.study = {...merged.study, ...src.study, step:1, deck:[], answers:{}, graded:false};
        ['page','selectedId','editId','sort','mistakeSort','search','calendarMonth'].forEach((k) => { if (src[k]) merged[k] = src[k]; });
      }
      merged.records = records.sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      merged.mistakes = mergeMistakes(merged.mistakes);
      merged.sort = merged.sort || 'time';
      merged.mistakeSort = merged.mistakeSort || 'time';
      return merged;
    } catch {
      return base;
    }
  }

  function loadLookupCache() {
    try {
      const parsed = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
      return parsed && typeof parsed === 'object' ? parsed : {};
    } catch {
      return {};
    }
  }

  function saveLookupCache() {
    localStorage.setItem(CACHE_KEY, JSON.stringify(lookupCache));
  }

  function saveNow() {
    localStorage.setItem(STORAGE, JSON.stringify(state));
  }

  function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveNow, 120);
  }

  function mergeMistakes(list) {
    const map = new Map();
    for (const raw of list || []) {
      if (!raw?.word && !raw?.key) continue;
      const key = wordKey(raw.word || raw.key);
      const current = map.get(key);
      const item = {...raw, key, word: raw.word || raw.key, count: Number(raw.count || 1), correctStreak:Number(raw.correctStreak || 0)};
      if (!current) {
        map.set(key, item);
      } else {
        current.count += item.count;
        current.correctStreak = Math.max(Number(current.correctStreak || 0), Number(item.correctStreak || 0));
        if ((item.lastWrongAt || '') > (current.lastWrongAt || '')) Object.assign(current, item, {count: current.count});
      }
    }
    return [...map.values()];
  }

  function duplicateTotal(word, excludeId = '') {
    const k = wordKey(word);
    if (!k) return 0;
    return state.records.filter((r) => wordKey(r.word) === k && r.id !== excludeId).length + (excludeId ? 0 : 0);
  }

  function sameWordTotal(word) {
    const k = wordKey(word);
    return state.records.filter((r) => wordKey(r.word) === k).length;
  }

  function currentRecord() {
    return state.records.find((r) => r.id === state.selectedId) || null;
  }

      <div class="stat"><span>重复词</span><strong>${dupWords}</strong></div>
      <div class="stat"><span>错题</span><strong>${mistakes}</strong></div>`;

  function card(record, actions = true) {
    const total = sameWordTotal(record.word);
    const dup = total > 1 ? `<span class="chip warn">重复 ${total}</span>` : '';
    return `<div class="card" data-id="${record.id}">
      <div>
        <h4>${esc(record.word)}${dup}</h4>
        <p>${esc(record.meaning || '未填写中文译')}</p>
        <div class="meta">
          ${record.pos ? `<span class="chip">${esc(record.pos)}</span>` : ''}
          <span class="chip">${fmt(record.createdAt)}</span>
          ${record.ipa ? `<span class="chip">${esc(record.ipa)}</span>` : ''}
          ${dup}
        </div>
      </div>
      ${actions ? `<div class="actions"><button class="btn" data-act="speak">发音</button><button class="btn" data-act="edit">编辑</button><button class="btn danger" data-act="del">删除</button></div>` : ''}
    </div>`;
  }

  function sortRecords(list, mode = state.sort) {
    const sorted = [...list];
    if (mode === 'alpha') sorted.sort((a,b) => a.word.localeCompare(b.word, 'en', {sensitivity:'base'}));
    else if (mode === 'time') sorted.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    return sorted;
  }

  function renderHome() {
    $('recentList').innerHTML = sortRecords(state.records, 'time').slice(0, 6).map((r) => card(r)).join('') || '<div class="empty">还没有记录。</div>';
    renderCalendar();

  function renderCalendar() {
    const [rawYear, rawMonth] = String(state.calendarMonth || today().slice(0, 7)).split('-').map(Number);
    const year = Number.isFinite(rawYear) ? rawYear : new Date().getFullYear();
    const month = Number.isFinite(rawMonth) ? rawMonth - 1 : new Date().getMonth();
    const monthKey = `${year}-${String(month + 1).padStart(2, '0')}`;
    state.calendarMonth = monthKey;
    $('monthName').textContent = `${year}.${String(month + 1).padStart(2, '0')}`;
    const first = new Date(year, month, 1);
    const days = new Date(year, month + 1, 0).getDate();
    const names = ['日','一','二','三','四','五','六'];
    const cells = names.map((n) => `<div class="calendar-day head">${n}</div>`);
    for (let i = 0; i < first.getDay(); i++) cells.push('<div></div>');
    for (let d = 1; d <= days; d++) {
      const date = `${year}-${String(month + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cls = ['calendar-day'];
      const log = state.studyLog[date] || {};
      const recordCount = state.records.filter((r) => day(r.createdAt) === date).length;
      const studied = Number(log.count || 0);
      const opened = Boolean(log.openedAt || log.opened);
      if (Number(log.studySeconds || 0) >= 1800 || studied || recordCount || opened) cls.push('opened');
      if (Number(log.studySeconds || 0) >= 1800) cls.push('done');
      if (date === today()) cls.push('today');
      const minutes = Math.floor(Number(log.studySeconds || 0) / 60);
      const title = `${date} · 记录 ${recordCount} 个 · 答题 ${studied} 个${minutes ? ` · 学习 ${minutes} 分钟` : ''}${opened ? ' · 已打开' : ''}`;
      cells.push(`<div class="${cls.join(' ')}" title="${esc(title)}">${d}</div>`);
    }
    $('calendar').innerHTML = cells.join('');
    const shownToday = monthKey === today().slice(0, 7);
    $('calendarHint').textContent = shownToday ? '今日已自动标记。' : '可切换月份查看历史记录。';
  }

  function shiftCalendar(delta) {
    const [rawYear, rawMonth] = String(state.calendarMonth || today().slice(0, 7)).split('-').map(Number);
    const d = new Date(Number.isFinite(rawYear) ? rawYear : new Date().getFullYear(), Number.isFinite(rawMonth) ? rawMonth - 1 : new Date().getMonth(), 1);
    d.setMonth(d.getMonth() + delta);
    state.calendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    saveNow();
    renderCalendar();
  }

  function fillForm(r) {
    $('word').value = r?.word || '';
    $('pos').value = r?.pos || '';
    $('ipa').value = r?.ipa || '';
    $('meaning').value = r?.meaning || '';
    $('related').value = Array.isArray(r?.related) ? r.related.join('；') : '';
    $('usAudio').value = r?.usAudio || '';
  }

  async function fetchJson(url, signal, timeoutMs = 7000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    const abort = () => controller.abort();
    if (signal) signal.addEventListener('abort', abort, {once:true});
    try {
      const res = await fetch(url, {signal:controller.signal, cache:'no-store'});
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    } finally {
      clearTimeout(timer);
      if (signal) signal.removeEventListener('abort', abort);
    }
  }

  async function translateYoudao(text, signal) {
    const raw = tidy(text);
    if (!raw) return '';
    try {
      const data = await fetchJson(`https://fanyi.youdao.com/translate?doctype=json&type=AUTO&i=${encodeURIComponent(raw)}`, signal, 1800);
      const chunks = Array.isArray(data?.translateResult) ? data.translateResult.flat().map((item) => tidy(item?.tgt || '')).filter(Boolean) : [];
      if (chunks.length) return chunks.join(' ');
    } catch (e) {
      if (e.name === 'AbortError') throw e;
    }
    return '';
  }

  function cleanMeaning(text, word = '') {
    let value = tidy(text)
      .replace(/^["“”'‘’]+|["“”'‘’]+$/g, '')
      .replace(/\s*[。.]?\s*$/, '');
    if (/[\u4e00-\u9fff]/.test(value)) value = value.replace(/^(?:[a-z]+\.?\s*)+/i, '').replace(/^[,;；、\s]+/, '');
    if (!value || /^[a-z][a-z\s-]*$/i.test(value)) return '';
    if (word && cleanAnswer(value) === cleanAnswer(word)) return '';
    return value;
  }

  function relatedWords(word, entries = []) {
    const base = wordKey(word);
    if (!base) return [];
    const roots = [base];
    if (base.endsWith('iful')) roots.push(base.slice(0, -4) + 'y');
    if (base.endsWith('ifully')) roots.push(base.slice(0, -6) + 'y');
    if (base.endsWith('iness')) roots.push(base.slice(0, -5) + 'y');
    for (const suffix of ['tion','sion','ment','ness','ity','er','or','ing','ed','ly','ful','ive','able','al']) {
      if (base.endsWith(suffix) && base.length > suffix.length + 2) roots.push(base.slice(0, -suffix.length));
    }
    const found = roots.map((root) => commonFamilies[root]).find(Boolean);
    if (found) return found.filter((item) => !item.toLowerCase().startsWith(`${base} `)).slice(0, 6);
    const posList = [...new Set((entries?.[0]?.meanings || []).map((m) => m.partOfSpeech).filter(Boolean))];
    return posList.slice(0, 3).map((pos) => `${base} (${pos})`);
  }

  function publishLookup(next, key, seq) {
    if (seq !== lookupSeq || wordKey($('word').value) !== key) return false;
    lookup = {...lookup, ...next, status:'ready', loading:Boolean(next.loading), error:''};
    lookupCache[key] = lookup;
    saveLookupCache();
    renderRecord();
    return true;
  }

  async function lookupWord(manual = true) {
    const word = tidy($('word').value);
    if (!word) return;
    clearTimeout(lookupTimer);
    const key = wordKey(word);
    const fastMeanings = fallbackMeanings[key] ? [...fallbackMeanings[key]] : [];
    const singleWord = isSingleWord(word);
    if (lookupCache[key] && (lookupCache[key].meanings || []).length) {
      lookup = {...lookupCache[key], meanings:[...new Set([...(lookupCache[key].meanings || []), ...fastMeanings].map(tidy).filter(Boolean))].slice(0, 8), loading:false, error:'', status:'ready'};
      renderRecord();
      if (!singleWord || (lookup.pos && lookup.ipa && lookup.usAudio)) return;
    }
    if (controller) controller.abort();
    controller = new AbortController();
    const signal = controller.signal;
    const seq = ++lookupSeq;
    lookup = {...blankLookup(word), meanings:fastMeanings, related:singleWord ? relatedWords(word) : [], loading:true, status:'loading'};
    renderRecord();
    const meaningTask = translateYoudao(word, signal).then((translated) => {
      const nextMeanings = [...new Set([...(fastMeanings || []), ...splitText(translated)].map(tidy).filter(Boolean))].slice(0, 8);
      return nextMeanings;
    }).catch(() => []);
    meaningTask.then((meanings) => {
      if (!meanings.length) return;
      publishLookup({word, meanings, source:'youdao', loading:false, lastLookupAt:new Date().toISOString()}, key, seq);
    }).catch(() => {});
    try {
      if (!singleWord) return;
      const entries = await fetchJson(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`, signal, 2600);
      if (seq !== lookupSeq) return;
      const entry = Array.isArray(entries) ? entries[0] : {};
      const phonetics = Array.isArray(entry.phonetics) ? entry.phonetics : [];
      const us = phonetics.find((p) => /-us\.mp3|us/i.test(p.audio || '') || /US/i.test(p.sourceUrl || '')) || phonetics.find((p) => p.audio) || {};
      const ipa = tidy(us.text || entry.phonetic || phonetics.find((p) => p.text)?.text || '');
      const pos = tidy(entry.meanings?.[0]?.partOfSpeech || '');
      const meanings = [...new Set([...(lookup.meanings || []), ...fastMeanings].map(tidy).filter(Boolean))].slice(0, 8);
      publishLookup({
        word, pos, ipa, usAudio: tidy(us.audio), source:'auto',
        meanings,
        related: relatedWords(word, entries),
        lastLookupAt:new Date().toISOString(),
        loading:false
      }, key, seq);
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
      const meanings = await meaningTask.catch(() => []);
      lookup = {...blankLookup(word), status:meanings.length ? 'ready' : 'error', error:meanings.length ? '' : '自动搜索失败，可手动填写。', meanings:[...new Set([...(fastMeanings || []), ...meanings].map(tidy).filter(Boolean))].slice(0, 8), related:singleWord ? relatedWords(word) : [], loading:false};
    }
    renderRecord();
  }

  function applyLookup() {
    if (!lookup.word) return;
    $('pos').value = lookup.pos || '';
    $('ipa').value = lookup.ipa || '';
    $('meaning').value = lookup.meanings.join('；');
    $('related').value = lookup.related.join('；');
    $('usAudio').value = lookup.usAudio || '';
    scheduleSave();
    renderRecord();
  }

  function saveRecord() {
    const d = draft();
    if (!d.word) return;
    const now = new Date().toISOString();
    const old = state.editId ? state.records.find((r) => r.id === state.editId) : null;
    const record = {
      id: old?.id || crypto.randomUUID(), word:d.word, pos:d.pos, ipa:d.ipa, meaning:d.meaning,
      related:d.related, usAudio:d.usAudio, source: lookup.source || old?.source || '',
      createdAt: old?.createdAt || now, updatedAt: now, lastLookupAt: lookup.lastLookupAt || old?.lastLookupAt || ''
    };
    const idx = state.records.findIndex((r) => r.id === record.id);
    if (idx >= 0) state.records[idx] = record;
    else state.records.unshift(record);
    state.selectedId = record.id;
    state.editId = '';
    saveNow();
    const keep = '';
    clearForm(keep);
    state.selectedId = record.id;
    renderAll();
  }

  function deleteRecord(id) {
    const record = state.records.find((r) => r.id === id) || currentRecord();
    if (!record) return;
    if (!confirm(`删除「${record.word}」？`)) return;
    state.records = state.records.filter((r) => r.id !== record.id);
    if (state.selectedId === record.id) state.selectedId = state.records[0]?.id || '';
    saveNow();
    fillForm();
    renderAll();
  }

  function answerOptions(r) {
    return splitText(r.meaning).map(cleanAnswer).filter(Boolean);
  }

  function answerOk(r, given) {
    const ans = cleanAnswer(given);
    if (!ans) return false;
    if (state.study.mode === 'cn-en') return ans === cleanAnswer(r.word);
    return answerOptions(r).some((opt) => opt && (ans === opt || opt.includes(ans) || ans.includes(opt)));
  }

  function studyBaseDeck(includeOrphanMistakes = true) {
    if (state.study.source !== 'mistakes') return [...state.records];
    return state.mistakes.map((m) => {
      const record = state.records.find((r) => wordKey(r.word) === wordKey(m.word));
      if (record) return record;
      return includeOrphanMistakes ? normalizeRecord({...m, createdAt:m.createdAt || m.lastWrongAt}) : null;
    }).filter(Boolean);
  }

  function studyDates() {
    const counts = new Map();
    for (const r of studyBaseDeck(false)) {
      const date = day(r.createdAt);
      if (!date) continue;
      counts.set(date, Number(counts.get(date) || 0) + 1);
    }
    return [...counts.entries()].sort((a,b) => b[0].localeCompare(a[0])).map(([date, count]) => ({date, count}));
  }

  function makeDeck() {
    const dateMode = state.study.range === 'date';
    let deck = studyBaseDeck(!dateMode);
    if (dateMode) deck = deck.filter((r) => day(r.createdAt) === state.study.date);
    deck = sortRecords(deck, 'time');
    const seen = new Set();
    return deck.filter((r) => r.word && !seen.has(r.id) && seen.add(r.id));
  }

  function startTest(mode) {
    state.study.mode = mode;
    state.study.deck = makeDeck();
    state.study.answers = {};
    state.study.graded = false;
    state.study.right = 0;
    state.study.wrong = 0;
    state.study.step = 5;
    state.study.startedAt = new Date().toISOString();
    const dateText = state.study.range === 'date' && state.study.date ? ` · ${state.study.date}` : '';
    state.study.summary = state.study.deck.length ? `共 ${state.study.deck.length} 题${dateText}。` : '当前没有可学习的词。';
    saveNow();
    renderStudy();
  }

  function addMistake(r, given, expected, prompt) {
    const key = wordKey(r.word);
    const now = new Date().toISOString();
    const cur = state.mistakes.find((m) => m.key === key || wordKey(m.word) === key);
    const data = {key, word:r.word, pos:r.pos, ipa:r.ipa, meaning:r.meaning, related:r.related, usAudio:r.usAudio, lastWrongAt:now, lastGiven:given, lastExpected:expected, lastPrompt:prompt, correctStreak:0};
    if (cur) Object.assign(cur, data, {count:Number(cur.count || 0) + 1});
    else state.mistakes.unshift({...data, count:1});
  }

  function rewardMistake(r) {
    const key = wordKey(r.word);
    const cur = state.mistakes.find((m) => m.key === key || wordKey(m.word) === key);
    if (!cur) return;
    cur.correctStreak = Number(cur.correctStreak || 0) + 1;
    cur.lastCorrectAt = new Date().toISOString();
    if (cur.correctStreak >= 3) {
      cur.count = Number(cur.count || 0) - 1;
      cur.correctStreak = 0;
    }
    if (Number(cur.count || 0) <= 0) state.mistakes = state.mistakes.filter((m) => m !== cur);
  }

  function studySecondsForGrade() {
    const started = new Date(state.study.startedAt || Date.now()).getTime();
    const elapsed = Math.round((Date.now() - started) / 1000);
    if (!Number.isFinite(elapsed) || elapsed < 0) return 0;
    return Math.min(elapsed, 4 * 60 * 60);
  }

  function grade() {
    const deck = state.study.deck || [];
    let right = 0, wrong = 0;
    if (state.study.graded) return;
    for (const r of deck) {
      const given = tidy(state.study.answers[r.id] || '');
      if (answerOk(r, given)) {
        right++;
        rewardMistake(r);
      }
      else {
        wrong++;
        addMistake(r, given, state.study.mode === 'cn-en' ? r.word : firstMeaning(r.meaning), state.study.mode === 'cn-en' ? firstMeaning(r.meaning) : r.word);
      }
    }
    state.study.right = right;
    state.study.wrong = wrong;
    state.study.graded = true;
    state.study.summary = `完成：${right} 对，${wrong} 错。`;
    const date = today();
    const old = state.studyLog[date] || {};
    state.studyLog[date] = {
      date,
      count:Number(old.count || 0) + deck.length,
      right:Number(old.right || 0) + right,
      wrong:Number(old.wrong || 0) + wrong,
      studySeconds:Number(old.studySeconds || 0) + studySecondsForGrade(),
      at:new Date().toISOString()
    };
    saveNow();
    renderAll();
  }

  function speak(word, audio = '') {
    if (audio) {
      const a = new Audio(audio);
      a.play().catch(() => speak(word));
      return;
    }
    if (!('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(word);
    u.lang = 'en-US';
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }

  function show(page) {
    state.page = page;
    saveNow();
    renderAll();
  }

  function wire() {
    if (wired) return;
    wired = true;
    $('app').addEventListener('click', (e) => {
      const go = e.target.closest('[data-go]'); if (go) return show(go.dataset.go);
      const page = e.target.closest('#nav [data-page]'); if (page) return show(page.dataset.page);
      const id = e.target.closest('button')?.id;
      if (id === 'newBtn') return clearForm();
      if (id === 'saveBtn') return saveRecord();
      if (id === 'deleteBtn') return deleteRecord(state.editId || state.selectedId);
      if (id === 'lookupBtn') return lookupWord(true);
      if (id === 'applyLookup') return applyLookup();
      if (id === 'speakBtn') return speak(tidy($('word').value), tidy($('usAudio').value));
      if (id === 'calPrev' || id === 'calNext') return shiftCalendar(id === 'calNext' ? 1 : -1);
      if (id === 'resetStudy') { state.study = {...state.study, step:1, range:'all', date:'', deck:[], answers:{}, graded:false, summary:'按步骤开始。', startedAt:''}; saveNow(); return renderStudy(); }
      if (id === 'gradeBtn') return grade();
      const sort = e.target.closest('[data-sort]'); if (sort) { state.sort = sort.dataset.sort; saveNow(); return renderHistory(); }
      const mistakeSort = e.target.closest('[data-mistake-sort]'); if (mistakeSort) { state.mistakeSort = mistakeSort.dataset.mistakeSort; saveNow(); return renderMistakes(); }
      const source = e.target.closest('[data-study-source]');
      if (source) {
        state.study.source = source.dataset.studySource;
        state.study.range = 'all';
        state.study.date = '';
        state.study.step = 2;
        state.study.summary = source.dataset.studySource === 'mistakes' ? '已选择错题本。' : '已选择全部单词。';
        saveNow();
        return renderStudy();
      }
      const range = e.target.closest('[data-study-range]');
      if (range) {
        state.study.range = range.dataset.studyRange;
        state.study.date = '';
        state.study.step = state.study.range === 'date' ? 3 : 4;
        state.study.summary = state.study.range === 'date' ? '请选择记录日期。' : '已选择全部测试。';
        saveNow();
        return renderStudy();
      }
      const studyDate = e.target.closest('[data-study-date]');
      if (studyDate) {
        state.study.range = 'date';
        state.study.date = studyDate.dataset.studyDate;
        state.study.step = 4;
        state.study.summary = `已选择 ${state.study.date}。`;
        saveNow();
        return renderStudy();
      }
      const mode = e.target.closest('[data-study-mode]'); if (mode) return startTest(mode.dataset.studyMode);
      const fillM = e.target.closest('[data-fill-meaning]'); if (fillM) { $('meaning').value = fillM.dataset.fillMeaning; return renderRecord(); }
      const fillR = e.target.closest('[data-fill-related]'); if (fillR) { $('related').value = [...splitText($('related').value), fillR.dataset.fillRelated].join('；'); return renderRecord(); }
      const ms = e.target.closest('[data-mistake-speak]'); if (ms) return speak(ms.dataset.mistakeSpeak, ms.dataset.audio || '');
      const md = e.target.closest('[data-mistake-delete]');
      if (md) {
        const key = md.dataset.mistakeDelete;
        const item = state.mistakes.find((m) => (m.key || wordKey(m.word)) === key);
        if (item && confirm(`删除错题「${item.word}」？`)) {
          state.mistakes = state.mistakes.filter((m) => (m.key || wordKey(m.word)) !== key);
          saveNow();
          renderAll();
        }
        return;
      }
      const cardEl = e.target.closest('.card[data-id]');
      if (cardEl) {
        const r = state.records.find((x) => x.id === cardEl.dataset.id);
        const act = e.target.closest('[data-act]')?.dataset.act;
        if (act === 'edit' && r) { state.selectedId = r.id; state.editId = r.id; fillForm(r); lookup = blankLookup(r.word); show('record'); return; }
        if (act === 'del') return deleteRecord(cardEl.dataset.id);
        if (act === 'speak' && r) return speak(r.word, r.usAudio);
        if (r) { state.selectedId = r.id; saveNow(); return renderStats(); }
      }
    });
    $('app').addEventListener('input', (e) => {
      if (e.target.id === 'historySearch') { state.search = e.target.value; scheduleSave(); return renderHistory(); }
      if (e.target.id === 'word') {
        const word = tidy(e.target.value);
        clearTimeout(lookupTimer);
        state.editId = '';
        $('pos').value = ''; $('ipa').value = ''; $('meaning').value = ''; $('related').value = ''; $('usAudio').value = '';
        lookup = blankLookup(word);
        if (word) lookupTimer = setTimeout(() => lookupWord(false), 180);
        scheduleSave();
        return renderRecord();
      }
      if (e.target.classList.contains('answer')) {
        state.study.answers[e.target.dataset.id] = e.target.value;
        scheduleSave();
        return renderStudyProgress();
      }
      if (['pos','ipa','meaning','related','usAudio'].includes(e.target.id)) { scheduleSave(); renderRecord(); }
    });
    $('app').addEventListener('change', (e) => {
      if (e.target.id === 'historySearch') state.search = e.target.value;
    });
  }
  function init() {
    if (!state.page) state.page = 'home';
    if (!state.sort) state.sort = 'time';
    markTodayOpen();
    renderShell();
    wire();
    if (!state.selectedId && state.records[0]) state.selectedId = state.records[0].id;
    renderAll();
    saveNow();
    window.addEventListener('beforeunload', saveNow);
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') saveNow(); });
  }

  init();
})();
</script>
</body>
